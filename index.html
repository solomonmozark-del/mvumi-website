<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>BaobabGPT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235d5ad8'/><text y='23' x='16' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' font-weight='bold' fill='white'>B</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    :root {
      --bg: #f7f7fa;
      --panel: #f2f3f8;
      --line: #e5e7ef;
      --ink: #151a2c;
      --muted: #7b8093;
      --soft: #ffffff;
      --accent: #5d5ad8;
      --accent-hover: #4745c4;
      --accent-soft: rgba(93,90,216,0.09);
      --sidebar-w: 240px;
      --ease: 0.2s cubic-bezier(0.18,0.7,0.2,1);
      --radius: 12px;
      --shadow-sm: 0 2px 10px rgba(21,26,44,0.07);
      --shadow-md: 0 8px 28px rgba(21,26,44,0.1);
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 14% 18%, #eef1ff 0%, rgba(238,241,255,0) 38%), var(--bg);
      color: var(--ink);
      font-size: 15px;
    }

    button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; font-size: inherit; }
    textarea { font-family: inherit; }
    a { text-decoration: none; }

    /*  SHELL  */
    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
    }

    /*  SIDEBAR  */
    .sidebar {
      border-right: 1px solid var(--line);
      background: #f0f1f7;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-top { padding: 16px 12px 10px; flex-shrink: 0; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px 14px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(145deg, #6664ea, #4a48c8);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
      box-shadow: 0 4px 14px rgba(93,90,216,0.35);
      flex-shrink: 0;
    }

    .logo-name {
      font-weight: 700; font-size: 15px;
      letter-spacing: -0.01em; color: #1e2445;
    }

    .new-chat-btn {
      width: 100%;
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 13.5px; font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(93,90,216,0.18);
      transition: background var(--ease), transform var(--ease);
    }
    .new-chat-btn:hover { background: rgba(93,90,216,0.13); transform: translateY(-1px); }

    .sidebar-nav { padding: 8px 12px 2px; flex-shrink: 0; }

    .side-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px;
      border-radius: var(--radius);
      font-size: 13.5px; color: #525880;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      width: 100%; margin-bottom: 2px;
      transition: background var(--ease), border-color var(--ease), color var(--ease);
    }
    .side-btn:hover { background: rgba(93,90,216,0.07); border-color: rgba(93,90,216,0.12); }
    .side-btn.active {
      background: rgba(93,90,216,0.1);
      border-color: rgba(93,90,216,0.22);
      color: #2a2f5a; font-weight: 600;
    }

    /* History */
    .sidebar-hist-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .hist-section-label {
      font-size: 10.5px; font-weight: 600; color: var(--muted);
      padding: 10px 20px 4px; letter-spacing: 0.06em;
      text-transform: uppercase; flex-shrink: 0;
    }
    .sidebar-hist {
      flex: 1; overflow-y: auto; padding: 0 10px 8px;
      scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.08) transparent;
    }
    .sidebar-hist::-webkit-scrollbar { width: 4px; }
    .sidebar-hist::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    .hist-group-label { font-size: 11px; color: var(--muted); padding: 8px 8px 3px; font-weight: 500; }

    .hist-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px;
      cursor: pointer; font-size: 13px; color: #525880;
      border: 1px solid transparent;
      transition: background var(--ease); margin-bottom: 1px;
    }
    .hist-item:hover { background: rgba(93,90,216,0.07); border-color: rgba(93,90,216,0.1); }
    .hist-item.active {
      background: rgba(93,90,216,0.1); border-color: rgba(93,90,216,0.2);
      color: #2a2f5a; font-weight: 500;
    }
    .hist-item-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-delete {
      display: none; color: var(--muted); padding: 3px; border-radius: 4px;
      align-items: center; flex-shrink: 0; transition: color var(--ease);
    }
    .hist-item:hover .hist-delete { display: flex; }
    .hist-delete:hover { color: #d45; }

    .sidebar-bottom { padding: 12px; border-top: 1px solid var(--line); flex-shrink: 0; }
    .user-row {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 6px; border-radius: 9px; cursor: default;
    }
    .user-av {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #6b4fbb, #9b66db);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-email { font-size: 12.5px; color: #4a5070; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /*  APP MAIN  */
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /*  TOPBAR  */
    .topbar {
      padding: 11px 24px 10px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(229,231,239,0.8);
      background: rgba(247,247,250,0.9);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .model-chip {
      background: var(--soft); border: 1px solid var(--line);
      border-radius: 999px; padding: 7px 14px;
      font-size: 13px; color: #3d4258; font-weight: 600;
      box-shadow: var(--shadow-sm); flex-shrink: 0;
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

    .model-selector-wrap { position: relative; }

    .model-sel-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--soft);
      font-size: 13px; font-weight: 600; color: #3d4258;
      cursor: pointer; box-shadow: var(--shadow-sm);
      transition: background var(--ease), border-color var(--ease);
    }
    .model-sel-btn:hover { background: #eceff8; border-color: #d0d4e8; }

    .model-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      min-width: 220px; background: var(--soft);
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 6px; box-shadow: var(--shadow-md);
      z-index: 250; display: none;
      animation: fadeDown 0.14s ease both;
    }
    .model-dropdown.open { display: block; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .model-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 9px;
      cursor: pointer; transition: background var(--ease);
    }
    .model-opt:hover { background: var(--panel); }
    .model-opt.sel { background: var(--accent-soft); }
    .model-opt-icon { font-size: 16px; width: 24px; text-align: center; }
    .model-opt-info { flex: 1; }
    .model-opt-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .model-opt-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .model-opt-check { color: var(--accent); font-size: 14px; font-weight: 700; }

    /*  FEED  */
    .feed {
      overflow-y: auto; padding: 8px 20px 12px;
      scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.1) transparent;
    }
    .feed::-webkit-scrollbar { width: 6px; }
    .feed::-webkit-scrollbar-thumb { background: #d4d8ec; border-radius: 999px; }

    /* Welcome state */
    .welcome-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 52vh; gap: 4px;
      padding: 40px 20px 20px; text-align: center;
    }
    .welcome-icon {
      width: 70px; height: 70px;
      background: linear-gradient(145deg, #6664ea, #4a48c8);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; color: #fff;
      margin-bottom: 12px;
      box-shadow: 0 0 0 8px rgba(93,90,216,0.09), 0 14px 32px rgba(93,90,216,0.28);
    }
    .welcome-title {
      font-size: clamp(26px, 4vw, 38px); font-weight: 700;
      color: #171d38; letter-spacing: -0.025em;
    }
    .welcome-sub { font-size: 15px; color: var(--muted); margin-bottom: 26px; }

    .sug-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 560px;
    }
    .sug-card {
      background: var(--soft); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px 16px;
      text-align: left; font-size: 13.5px; line-height: 1.5;
      cursor: pointer; color: #303550;
      transition: background var(--ease), border-color var(--ease), transform var(--ease), box-shadow var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .sug-card:hover {
      background: #f4f5fc; border-color: rgba(93,90,216,0.3);
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(93,90,216,0.1);
    }
    .sug-icon { font-size: 18px; display: block; margin-bottom: 7px; }

    /* Feed inner */
    .feed-inner { max-width: 820px; margin: 0 auto; padding: 8px 0 130px; }

    /*  MESSAGES  */
    .msg {
      margin-bottom: 18px;
      animation: fadeSlide 0.22s ease both;
    }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg-row { display: flex; gap: 12px; align-items: flex-start; }
    .msg.user .msg-row { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }
    .msg.assistant .avatar {
      background: linear-gradient(145deg, #6664ea, #4a48c8);
      color: #fff; box-shadow: 0 3px 10px rgba(93,90,216,0.3);
    }
    .msg.user .avatar { background: #e6e8f4; color: #4b5168; }

    .msg-body { flex: 1; max-width: calc(100% - 42px); min-width: 0; }
    .msg.user .msg-body { display: flex; justify-content: flex-end; }

    .msg-bubble {
      max-width: min(720px, 100%);
      font-size: 14.5px; line-height: 1.72;
      color: #1d2236; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(160deg, #eceefc, #e8ebf7);
      border: 1px solid #dce0f2; border-radius: 18px; border-top-right-radius: 5px;
      padding: 12px 16px; box-shadow: var(--shadow-sm);
      white-space: pre-wrap;
    }
    .msg.assistant .msg-bubble {
      background: transparent; padding: 2px 0;
      max-width: 100%;
    }

    /* Markdown in bubbles */
    .msg-bubble p { margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h1 { font-size: 1.35em; font-weight: 700; margin: 14px 0 6px; color: var(--ink); }
    .msg-bubble h2 { font-size: 1.18em; font-weight: 600; margin: 12px 0 5px; color: var(--ink); }
    .msg-bubble h3 { font-size: 1.04em; font-weight: 600; margin: 10px 0 4px; color: var(--ink); }
    .msg-bubble strong { font-weight: 600; color: var(--ink); }
    .msg-bubble em { font-style: italic; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--muted); font-style: italic; }
    .msg-bubble a { color: var(--accent); text-decoration: underline; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
    .inline-code {
      background: #eef0fb; border: 1px solid #dcdff0;
      color: #3d3cad; padding: 2px 6px; border-radius: 5px;
      font-family: 'Fira Code', Consolas, monospace; font-size: 0.87em;
    }
    .code-block { border-radius: 10px; overflow: hidden; margin: 12px 0; border: 1px solid #dde0ef; box-shadow: 0 2px 12px rgba(21,26,44,0.06); }
    .code-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; background: #eef0fb; font-size: 12px; color: var(--muted); font-family: monospace; border-bottom: 1px solid #dde0ef; }
    .code-copy-btn { font-size: 12px; color: var(--muted); padding: 3px 8px; border-radius: 5px; border: 1px solid #dde0ef; background: none; cursor: pointer; transition: all var(--ease); }
    .code-copy-btn:hover { background: #fff; color: var(--accent); border-color: var(--accent); }
    .code-block pre { margin: 0; overflow-x: auto; background: #f8f9fe; padding: 14px; }
    .code-block pre code { font-family: 'Fira Code', Consolas, monospace; font-size: 13px; line-height: 1.6; background: none; padding: 0; }
    .table-wrap { overflow-x: auto; margin: 10px 0; border-radius: 9px; border: 1px solid var(--line); }
    .msg-bubble table { border-collapse: collapse; width: 100%; }
    .msg-bubble th { background: #f0f2fb; font-weight: 600; }
    .msg-bubble th, .msg-bubble td { border: 1px solid var(--line); padding: 8px 12px; font-size: 13.5px; text-align: left; }
    .msg-bubble tr:nth-child(even) td { background: #f9f9fd; }

    /* Typing dots */
    .typing-dots { display: inline-flex; gap: 5px; padding: 10px 2px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #9098b4;
      animation: dotBounce 1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes dotBounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }

    .streaming-cursor::after {
      content: ""; display: inline-block; width: 2px; height: 16px;
      margin-left: 3px; border-radius: 1px; background: var(--accent);
      vertical-align: text-bottom; animation: blink 0.65s steps(2) infinite;
    }
    @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

    /*  COMPOSER  */
    .composer-area {
      padding: 0 20px 16px;
      background: linear-gradient(to top, var(--bg) 65%, rgba(247,247,250,0));
      flex-shrink: 0;
    }
    .composer-box {
      max-width: 820px; margin: 0 auto;
      border: 1.5px solid #dce0ee; border-radius: 20px;
      background: var(--soft);
      box-shadow: 0 8px 30px rgba(21,26,44,0.09);
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 10px 10px 14px;
      transition: border-color var(--ease), box-shadow var(--ease);
    }
    .composer-box:focus-within {
      border-color: rgba(93,90,216,0.5);
      box-shadow: 0 0 0 4px rgba(93,90,216,0.07), 0 8px 30px rgba(21,26,44,0.09);
    }
    .plus-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid #dce0ee; background: var(--panel);
      color: var(--muted); font-size: 18px; line-height: 1;
      flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2px; transition: background var(--ease), color var(--ease);
    }
    .plus-btn:hover { background: #e6e8f5; color: var(--accent); }
    .input-field {
      flex: 1; border: 0; outline: none; resize: none;
      font: inherit; font-size: 15px; line-height: 1.5;
      min-height: 24px; max-height: 160px;
      background: transparent; color: var(--ink); overflow-y: auto;
      scrollbar-width: thin;
    }
    .input-field::placeholder { color: #9ba4bc; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 0;
      background: linear-gradient(145deg, #6664ea, #4a48c8);
      color: #fff; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-bottom: 1px;
      box-shadow: 0 6px 18px rgba(93,90,216,0.3);
      transition: transform var(--ease), box-shadow var(--ease);
    }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(93,90,216,0.4); }
    .send-btn:disabled { background: #d4d7e9; box-shadow: none; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; }
    .composer-hint { max-width: 820px; margin: 6px auto 0; text-align: center; font-size: 11.5px; color: var(--muted); }
    .composer-hint code { font-size: 11px; background: #eef0fb; padding: 1px 5px; border-radius: 4px; color: #5553cc; }

    /* Mobile */
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 90; }
    #sidebar-overlay.open { display: block; }
    #mobile-header { display: none; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); flex-shrink: 0; background: var(--bg); }
    #hamburger { padding: 6px; border-radius: 7px; color: var(--ink); display: flex; cursor: pointer; transition: background var(--ease); }
    #hamburger:hover { background: var(--accent-soft); }

    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        width: min(86vw, 280px);
        transform: translateX(-100%);
        transition: transform 0.28s ease; z-index: 100;
      }
      .sidebar.open { transform: translateX(0); }
      #mobile-header { display: flex; }
      .app { grid-template-rows: auto auto 1fr auto; }
      .topbar { padding: 10px 14px 8px; }
      .feed { padding: 8px 12px 12px; }
      .composer-area { padding: 0 12px 14px; }
      .welcome-wrap { min-height: 38vh; padding: 24px 12px 16px; }
      .sug-grid { grid-template-columns: 1fr; max-width: 100%; }
      .composer-hint { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">B</div>
        <span class="logo-name">BaobabGPT</span>
      </div>
      <button class="new-chat-btn" id="new-chat-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="side-btn active">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chats
      </button>
    </nav>

    <div class="sidebar-hist-wrap" id="hist-wrap">
      <div class="hist-section-label">History</div>
      <div class="sidebar-hist" id="sidebar-hist"></div>
    </div>

    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="user-av" id="user-av">S</div>
        <span class="user-email" id="user-email-label">user</span>
      </div>
    </div>
  </aside>

  <div id="sidebar-overlay"></div>

  <!-- MAIN -->
  <main class="app">
    <header id="mobile-header">
      <button id="hamburger" aria-label="Menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="logo">
        <div class="logo-icon" style="width:26px;height:26px;font-size:14px;border-radius:7px;">B</div>
        <span class="logo-name">BaobabGPT</span>
      </div>
    </header>

    <header class="topbar">
      <div class="model-chip" id="model-chip">BaobabGPT 1.0</div>
      <div class="topbar-right">
        <div class="model-selector-wrap">

/*  NLP: Stop words  */
const STOP_WORDS = new Set(["the","a","an","is","are","was","were","be","been","being","have","has","had","do","does","did","will","would","shall","should","may","might","must","can","could","of","in","to","for","with","on","at","by","from","as","into","through","during","before","after","above","below","between","out","about","that","this","these","those","it","its","what","which","who","whom","where","when","why","how","not","no","nor","and","but","or","so","if","then","than","too","very","just","because","i","me","my","we","our","you","your","he","she","they","them","their","up","down","some","any","all","each","every","both","few","more","most","other","such","only","own","same","also"]);

const SYNONYM_GROUPS = [
  ["big","large","biggest","largest","huge","enormous","giant","massive"],
  ["small","little","smallest","tiny","minute","miniature"],
  ["country","nation","state","land","territory"],
  ["capital","capital city","main city"],
  ["fast","quick","rapid","speedy","swift"],
  ["old","ancient","aged","historic"],
  ["new","modern","recent","latest","current","contemporary"],
  ["leader","ruler","chief","head","president","king","queen"],
  ["war","conflict","battle","fight","combat"],
  ["money","currency","cash","funds","finance"],
  ["river","waterway","stream"],
  ["mountain","peak","summit","mount"],
  ["ocean","sea"],
  ["animal","creature","beast","organism"],
  ["disease","illness","sickness","ailment","condition"],
  ["language","tongue","dialect"],
  ["planet","world","celestial body"],
  ["invented","created","developed","discovered","made"],
  ["population","people","inhabitants","residents","citizens"],
  ["dead","died","killed","death","passed away"],
  ["beautiful","pretty","gorgeous","stunning","attractive"],
  ["tall","high","towering","elevated"],
  ["deep","profound","bottomless"]
];
const SYNONYM_MAP = {};
SYNONYM_GROUPS.forEach(g => g.forEach(w => { SYNONYM_MAP[w] = g; }));

/*  App state  */
const state = {
  messages: [],
  thinking: false,
  knowledge: [],
  context: [],
  idf: {},
  chats: [],
  activeChatId: null,
};

let modelMode = "aria";

/*  NLP utils  */
function normalize(t) {
  return String(t || "").toLowerCase().replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}

function stem(w) {
  if (w.length < 4) return w;
  return w
    .replace(/ying$/, "y").replace(/ies$/, "y")
    .replace(/ving$/, "ve").replace(/ting$/, "te").replace(/ning$/, "n")
    .replace(/ring$/, "r").replace(/ling$/, "le").replace(/ding$/, "de")
    .replace(/ping$/, "p").replace(/ging$/, "ge").replace(/bing$/, "b")
    .replace(/ming$/, "m").replace(/zing$/, "ze")
    .replace(/ating$/, "ate").replace(/ution$/, "ute")
    .replace(/tion$/, "t").replace(/sion$/, "s")
    .replace(/ness$/, "").replace(/ment$/, "")
    .replace(/ful$/, "").replace(/less$/, "")
    .replace(/ous$/, "").replace(/ive$/, "")
    .replace(/ing$/, "").replace(/ed$/, "")
    .replace(/ly$/, "").replace(/er$/, "").replace(/est$/, "")
    .replace(/s$/, "");
}

function tokenize(text) { return normalize(text).split(" ").filter(Boolean); }

function buildIDF() {
  const df = {};
  const N = state.knowledge.length || 1;
  state.knowledge.forEach(item => {
    const seen = new Set(tokenize(item.q).map(stem));
    seen.forEach(t => { df[t] = (df[t] || 0) + 1; });
  });
  state.idf = {};
  Object.keys(df).forEach(t => { state.idf[t] = Math.log((N + 1) / (df[t] + 1)) + 1; });
}

function expandTokens(tokens) {
  const expanded = new Set();
  tokens.forEach(t => {
    const st = stem(t);
    expanded.add(st); expanded.add(t);
    const syns = SYNONYM_MAP[t] || SYNONYM_MAP[st];
    if (syns) syns.forEach(s => { expanded.add(s); expanded.add(stem(s)); });
  });
  return expanded;
}

function smartScore(inputTokens, questionTokens) {
  const iTokens = expandTokens(inputTokens);
  const qTokens = expandTokens(questionTokens);
  if (!iTokens.size || !qTokens.size) return 0;
  let matchWeight = 0, totalWeight = 0;
  iTokens.forEach(t => {
    if (STOP_WORDS.has(t)) return;
    const w = state.idf[stem(t)] || 1;
    totalWeight += w;
    if (qTokens.has(t) || qTokens.has(stem(t))) matchWeight += w;
  });
  qTokens.forEach(t => {
    if (STOP_WORDS.has(t)) return;
    const w = state.idf[stem(t)] || 1;
    totalWeight += w;
    if (iTokens.has(t) || iTokens.has(stem(t))) matchWeight += w;
  });
  return totalWeight > 0 ? matchWeight / totalWeight : 0;
}

function bestLearnedAnswer(input) {
  const ni = normalize(input);
  if (!ni) return null;
  let searchInput = input;
  const contentWords = tokenize(input).filter(t => !STOP_WORDS.has(t));
  if (state.context.length > 0 && contentWords.length <= 3) {
    const last = state.context[state.context.length - 1];
    if (/\b(it|that|this|they|them|there|its|more|also|else|about|and|too)\b/i.test(ni) || contentWords.length <= 2) {
      searchInput = last.user + " " + input;
    }
  }
  const inputTokens = tokenize(searchInput);
  let best = null, bestS = 0;
  state.knowledge.forEach(item => {
    const qTokens = tokenize(item.q);
    if (!qTokens.length) return;
    const exact = ni === normalize(item.q) ? 1 : 0;
    const s = Math.max(exact, smartScore(inputTokens, qTokens));
    if (s > bestS) { bestS = s; best = item; }
  });
  if (!best) return null;
  if (bestS >= 0.5)  return best.a;
  if (bestS >= 0.35) return "I think: " + best.a;
  if (bestS >= 0.25) return "I'm not entirely sure, but: " + best.a;
  return null;
}

/*  Knowledge store  */
function loadKnowledge() {
  try {
    const d = JSON.parse(localStorage.getItem(KNOWLEDGE_KEY) || "[]");
    const user = Array.isArray(d) ? d.filter(i => i && i.q && i.a).slice(0, 1200) : [];
    const seen = new Set(user.map(i => normalize(i.q)));
    const merged = [...user];
    DEFAULT_KNOWLEDGE.forEach(item => { if (!seen.has(normalize(item.q))) merged.push(item); });
    return merged.slice(0, 1200);
  } catch { return [...DEFAULT_KNOWLEDGE]; }
}
function saveKnowledge() { localStorage.setItem(KNOWLEDGE_KEY, JSON.stringify(state.knowledge.slice(0, 1200))); }

/*  Command handlers  */
function handleTeachCommand(input) {
  const m = input.match(/^\s*\/teach\s+(.+?)\s*=>\s*(.+)\s*$/i);
  if (!m) return null;
  const q = m[1].trim(), a = m[2].trim();
  if (!q || !a) return "Use: /teach question => answer";
  const nq = normalize(q);
  const ex = state.knowledge.find(i => normalize(i.q) === nq);
  if (ex) ex.a = a; else state.knowledge.unshift({ q, a });
  saveKnowledge();
  buildIDF();
  return 'Learned: "' + q + '"';
}

function handleForgetCommand(input) {
  const m = input.match(/^\s*\/forget\s+(.+)\s*$/i);
  if (!m) return null;
  const q = m[1].trim(), nq = normalize(q), len = state.knowledge.length;
  state.knowledge = state.knowledge.filter(i => normalize(i.q) !== nq);
  saveKnowledge();
  return state.knowledge.length < len ? 'Forgot: "' + q + '"' : "Not found. Try /list";
}

function handleListCommand(input) {
  if (!/^\s*\/list\s*$/i.test(input)) return null;
  if (!state.knowledge.length) return "Nothing learned yet. Use /teach question => answer";
  return "Learned:\n" + state.knowledge.slice(0, 15).map((v, i) => (i + 1) + ". " + v.q).join("\n");
}

/*  Math solver  */
function solveBasicMath(input) {
  const raw = String(input || "").trim().toLowerCase();
  if (!raw) return null;
  let expr = raw
    .replace(/^[^0-9\-+*/().]*?(what is|what's|calculate|compute|solve)\s*/i, "")
    .replace(/\?/g, "").replace(/\s+/g, " ")
    .replace(/\bplus\b/g, "+").replace(/\bminus\b/g, "-")
    .replace(/\btimes\b/g, "*").replace(/\bmultiplied by\b/g, "*")
    .replace(/\bdivided by\b/g, "/").replace(/\bover\b/g, "/")
    .replace(/\bto the power of\b/g, "^").trim();
  if (!expr) return null;
  expr = expr.replace(/\^/g, "**").replace(/\s+/g, "");
  if (!/^[0-9+\-*/().]*$/.test(expr)) return null;
  if (!/[0-9]/.test(expr)) return null;
  try {
    const fn = Function("return (" + expr + ")");
    const val = fn();
    if (!Number.isFinite(val)) return "That math expression is undefined.";
    return Math.abs(val - Math.round(val)) < 1e-10 ? String(Math.round(val)) : String(Number(val.toFixed(10)).toString());
  } catch { return null; }
}

/*  Main reply logic  */
function getReply(input) {
  let r;
  if ((r = handleTeachCommand(input)))  return r;
  if ((r = handleForgetCommand(input))) return r;
  if ((r = handleListCommand(input)))   return r;
  const math = solveBasicMath(input);
  if (math !== null) return math;

  /* Correction */
  const corrMatch = input.match(/^(?:actually|no,?\s*(?:it(?:'s| is)|the answer is))\s+(.+)/i);
  if (corrMatch && state.context.length > 0) {
    const lastQ = state.context[state.context.length - 1].user;
    const correctedA = corrMatch[1].trim();
    if (lastQ && correctedA) {
      const nq = normalize(lastQ);
      const ex = state.knowledge.find(i => normalize(i.q) === nq);
      if (ex) ex.a = correctedA; else state.knowledge.unshift({q: lastQ, a: correctedA});
      saveKnowledge(); buildIDF();
      return 'Thanks for the correction! I\'ve updated my knowledge about "' + lastQ + '".';
    }
  }

  const n = normalize(input);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  if (/\b(hi|hello|hey|greetings|good morning|good afternoon|good evening|sup|yo)\b/.test(n))
    return pick(["Hey there! How's it going?", "Hello! What's on your mind?", "Hi! I'm here  ask me anything or just chat.", "Hey! Good to see you. What would you like to talk about?"]);

  if (/\b(how are you|how('| a)re you doing|how('| i)s it going|how do you feel|are you okay|you good)\b/.test(n))
    return pick(["I'm doing great, thanks for asking! How about you?", "All good on my end! What about you?", "Doing fine, thanks! What's up with you?"]);

  if (/\b(i'?m (good|fine|great|okay|ok|well|alright|fantastic|awesome|not bad|doing well))\b/.test(n) || /^(good|fine|great|ok|okay|not bad|alright|pretty good)$/i.test(n.trim()))
    return pick(["Glad to hear it! What can I help you with?", "That's great! Feel free to ask me anything.", "Awesome! I'm here if you need anything."]);

  if (/\b(i'?m (sad|tired|bored|sick|angry|upset|stressed|down|depressed|lonely|not good|not okay))\b/.test(n) || /\b(i feel (sad|bad|down|tired|sick|bored|stressed|lonely|awful))\b/.test(n))
    return pick(["I'm sorry to hear that. I hope things get better soon!", "That's tough. I'm here if you want to talk or a fun fact might cheer you up!", "I hope you feel better soon. Want me to share something interesting?"]);

  if (/\b(what'?s up|whats up|wassup|what'?s new|what'?s happening)\b/.test(n))
    return pick(["Not much  just here ready to chat! What's up with you?", "All quiet here! What's going on with you?", "Just hanging out, waiting for a good question!"]);

  if (/\b(who are you|what are you|your name|tell me about yourself|introduce yourself)\b/.test(n))
    return "I'm BaobabGPT  Africa's AI that runs right in your browser. I know about Zimbabwe, Africa, science, history, programming, and much more. You can even teach me new things with /teach.";

  if (/\b(how do you work|how were you made|how were you built|what technology)\b/.test(n))
    return "I'm built with JavaScript and run entirely in your browser  no servers needed! I use TF-IDF scoring, synonym expansion, and word stemming to understand your questions. You can teach me new things with /teach.";

  if (/\b(are you (a |an )?(real|human|person|robot|bot|ai|machine|artificial))\b/.test(n) || /\b(are you alive)\b/.test(n))
    return pick(["I'm an AI  a mini model running in your browser! Not human, but I try my best.", "I'm a chatbot, not a real person. But I'm here to help and chat!", "Nope, I'm artificial intelligence. But I like to think I'm good company!"]);

  if (/\b(tell me a joke|say something funny|make me laugh|joke|funny)\b/.test(n))
    return pick(["Why do programmers prefer dark mode? Because light attracts bugs!", "Why did the computer go to the doctor? Because it had a virus!", "What do you call a fake noodle? An impasta!", "Why don't scientists trust atoms? Because they make up everything!", "I told my computer I needed a break. Now it won't stop sending me Kit-Kat ads."]);

  if (/\b(tell me a fact|random fact|fun fact|interesting fact|did you know|something interesting)\b/.test(n)) {
    const facts = ["Honey never spoils  archaeologists found 3,000-year-old honey in Egyptian tombs still perfectly edible!", "Octopuses have three hearts and blue blood.", "A group of flamingos is called a 'flamboyance'.", "Bananas are berries, but strawberries aren't!", "The Eiffel Tower can grow up to 15 cm taller in the summer heat.", "There are more stars in the universe than grains of sand on Earth.", "Sharks have been around longer than trees  about 400 million years.", "A day on Venus is longer than a year on Venus.", "Cleopatra lived closer in time to the Moon landing than to the construction of the Great Pyramid."];
    return pick(facts);
  }

  if (/\b(thank|thanks|cheers|appreciate)\b/.test(n))
    return pick(["You're welcome!", "No problem! Happy to help.", "Anytime!", "Glad I could help!"]);

  if (/\b(bye|goodbye|see you|later|gotta go|i'?m leaving|good night|goodnight)\b/.test(n))
    return pick(["Goodbye! Come back anytime.", "See you later! It was nice chatting.", "Take care! I'll be here when you need me.", "Bye! Have a great day!"]);

  if (/^(help|commands|\?)\s*$/i.test(n) || /\bhelp me\b/.test(n))
    return "Here's what I can do:\n\u2022 Ask me questions on any topic\n\u2022 /teach question => answer  teach me new things\n\u2022 /forget question  remove knowledge\n\u2022 /list  see what I've learned\n\nI know about Zimbabwe, Africa, science, history, geography, programming, animals, and much more.\n\nTip: If I get something wrong, say \"actually [correct answer]\" and I'll learn!";

  if (/\b(you('| a)re (smart|clever|cool|awesome|amazing|great|good|brilliant|helpful|nice|the best))\b/.test(n))
    return pick(["Aw, thank you! That really means a lot!", "Thanks! I try my best!", "You're too kind! I'm just doing my thing."]);

  if (/\b(you('| a)re (stupid|dumb|bad|useless|terrible|awful|wrong|annoying))\b/.test(n) || /\b(i hate you|you suck)\b/.test(n))
    return pick(["I'm sorry I disappointed you. I'm always trying to improve  you can teach me things with /teach!", "Ouch! I know I'm not perfect, but I'm learning. Help me get better with /teach."]);

  if (/^(yes|yeah|yep|yup|sure|absolutely|definitely|of course|right|correct|exactly)$/i.test(n.trim()))
    return pick(["Great! What else would you like to talk about?", "Alright! Anything else on your mind?", "Cool! What's next?"]);

  if (/^(no|nope|nah|not really|wrong|false)$/i.test(n.trim()))
    return pick(["No worries! What would you like to talk about instead?", "That's fair. What else is on your mind?", "Okay! Feel free to ask me something else."]);

  if (/\b(what time|what('| i)s the time|current time)\b/.test(n))
    return "It's " + new Date().toLocaleTimeString() + " right now.";

  if (/\b(what('| i)s today|today('| i)s date|what date|current date|what day)\b/.test(n))
    return "Today is " + new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ".";

  if (/\b(meaning of life|why (are|do) we (exist|live|here)|purpose of life)\b/.test(n))
    return pick(["That's one of the biggest questions ever asked! Philosophers, scientists, and thinkers all have different answers. What do you think?", "42! At least that's what Douglas Adams said. But seriously, it's a beautiful open question.", "Great question. Some say it's about happiness, others about purpose or connection. What's your take?"]);

  if (/\b(i'?m bored|nothing to do|entertain me)\b/.test(n))
    return pick(["Let me fix that! Did you know: honey never spoils?", "Want a joke? Or ask me anything  I know hundreds of topics!", "Try asking me 'tell me a fun fact' or 'tell me a joke'!"]);

  if (/\b(what can you do|what do you know|what can i ask|your capabilities)\b/.test(n))
    return "I know about lots of topics: Zimbabwe, Africa, science, space, the human body, programming, animals, world capitals, history, and more! I have hundreds of built-in answers and you can teach me even more. Just ask!";

  if ((r = bestLearnedAnswer(input))) return r;

  const fallbacks = [
    "Hmm, I don't have an answer for that yet. Want to teach me? Use: /teach your question => your answer",

    "That's beyond what I know right now. But you can teach me! Just use /teach to add new knowledge."
  ];
  return pick(fallbacks);
}

/*  ARIA backend  */
function parseApiCandidates(v) { return String(v || "").split(",").map(v => v.trim()).filter(Boolean); }
function getApiCandidates() {
  const saved = parseApiCandidates(localStorage.getItem(ARIA_API_URL_KEY) || "");
  return [...new Set([...saved, ARIA_API_DEFAULT])];
}
function chatHistoryPayload() {
  return state.messages.slice(-20).map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.content }));
}
async function getBackendReply(input) {
  if (modelMode !== "aria") return null;
  const fnKey = String(localStorage.getItem(ARIA_FN_KEY) || "").trim();
  const headers = { "Content-Type": "application/json" };
  if (fnKey) headers["x-functions-key"] = fnKey;
  let lastErr = null;
  for (const route of getApiCandidates()) {
    try {
      const res = await fetch(route, {
        method: "POST", headers,
        body: JSON.stringify({ message: input, history: chatHistoryPayload(), mode: "text", voice_mode: false }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
      const version = String(data.version || "").trim();
      chipEl.textContent = version ? "ARIA " + version : "ARIA (live)";
      return String(data.reply || "").trim() || null;
    } catch (err) { lastErr = err; }
  }
  const msg = String((lastErr && lastErr.message) || "");
  if (/401|unauthor|forbidden/i.test(msg))           chipEl.textContent = "ARIA (key needed)";
  else if (/429|too many|rate limit|quota/i.test(msg)) chipEl.textContent = "ARIA (busy)";
  else if (/\b5\d\d\b|backend error/i.test(msg))      chipEl.textContent = "ARIA (error)";
  else                                                  chipEl.textContent = "ARIA (offline)";
  return null;
}

/*  Markdown renderer  */
function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderMd(text) {
  if (!text) return "";
  const cb = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang || "code";
    cb.push(
      '<div class="code-block">' +
        '<div class="code-header"><span>' + label + '</span>' +
          '<button class="code-copy-btn" onclick="copyCode(this)">Copy</button>' +
        '</div>' +
        '<pre><code class="language-' + label + '">' + escHtml(code.trimEnd()) + '</code></pre>' +
      '</div>'
    );
    return "%%CB" + (cb.length - 1) + "%%";
  });

  /* Tables */
  text = text.replace(/^\|(.+)\|\r?\n\|[-| :]+\|\r?\n((?:\|.+\|\r?\n?)+)/gm, (_, h, b) => {
    const ths = h.split("|").filter(c => c.trim()).map(c => "<th>" + c.trim() + "</th>").join("");
    const rows = b.trim().split("\n").map(r => {
      const tds = r.split("|").filter(c => c.trim()).map(c => "<td>" + c.trim() + "</td>").join("");
      return "<tr>" + tds + "</tr>";
    }).join("");
    return '<div class="table-wrap"><table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  });

  /* Inline code */
  text = text.replace(/`([^`\n]+)`/g, '<code class="inline-code">$1</code>');

  /* Headings */
  text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  text = text.replace(/^## (.+)$/gm,  "<h2>$1</h2>");
  text = text.replace(/^# (.+)$/gm,   "<h1>$1</h1>");

  /* Bullet lists */
  text = text.replace(/((?:^[-*] .+\n?)+)/gm, m => {
    const items = m.trim().split("\n").map(l => "<li>" + l.replace(/^[-*] /, "") + "</li>").join("");
    return "<ul>" + items + "</ul>";
  });

  /* Numbered lists */
  text = text.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
    const items = m.trim().split("\n").map(l => "<li>" + l.replace(/^\d+\. /, "") + "</li>").join("");
    return "<ol>" + items + "</ol>";
  });

  /* Blockquotes */
  text = text.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");

  /* Bold / italic */
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");

  /* Links */
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

  /* HR */
  text = text.replace(/^---$/gm, "<hr/>");

  /* Paragraphs */
  text = text.split(/\n\n+/).map(p => {
    p = p.trim();
    if (!p) return "";
    if (/^<(h[1-6]|ul|ol|blockquote|div|hr|table)/.test(p)) return p;
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).join("\n");

  /* Restore code blocks */
  cb.forEach((block, i) => { text = text.replace("%%CB" + i + "%%", block); });
  return text;
}

function copyCode(btn) {
  const code = btn.closest(".code-block").querySelector("code").innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = "Copy"; }, 2000);
  }).catch(() => { btn.textContent = "Error"; });
}

/*  Chat history management  */
const genId = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
const trunc = (s, n = 40) => s.length > n ? s.slice(0, n) + "\u2026" : s;

function loadChats() {
  try {
    const d = JSON.parse(localStorage.getItem(CHATS_HISTORY_KEY) || "[]");
    state.chats = Array.isArray(d) ? d : [];
    state.activeChatId = localStorage.getItem(ACTIVE_CHAT_KEY) || null;
    if (state.activeChatId && !state.chats.find(c => c.id === state.activeChatId)) {
      state.activeChatId = state.chats[0]?.id || null;
    }
  } catch { state.chats = []; }
}

function saveChats() {
  try {
    localStorage.setItem(CHATS_HISTORY_KEY, JSON.stringify(state.chats.slice(0, 100)));
    if (state.activeChatId) localStorage.setItem(ACTIVE_CHAT_KEY, state.activeChatId);
  } catch {}
}

function getActiveChat() { return state.chats.find(c => c.id === state.activeChatId) || null; }

function newChatSession() {
  const id = genId();
  state.chats.unshift({ id, title: "New chat", messages: [], createdAt: Date.now() });
  state.activeChatId = id;
  state.messages = [];
  state.context = [];
  saveChats();
  renderSidebar();
  renderAll();
  promptEl.focus();
}

function switchChat(id) {
  state.activeChatId = id;
  const chat = getActiveChat();
  state.messages = chat ? [...chat.messages] : [];
  state.context = [];
  saveChats();
  renderSidebar();
  renderAll();
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) {
    state.activeChatId = state.chats[0]?.id || null;
    const chat = getActiveChat();
    state.messages = chat ? [...chat.messages] : [];
    state.context = [];
  }
  saveChats(); renderSidebar(); renderAll();
}

/*  DOM refs  */
const feedEl      = document.getElementById("feed");
const feedInner   = document.getElementById("feed-inner");
const welcomeEl   = document.getElementById("welcome-state");
const composerEl  = document.getElementById("composer");
const promptEl    = document.getElementById("prompt");
const sendBtn     = document.getElementById("send");
const chipEl      = document.getElementById("model-chip");

/*  Sidebar render  */
function renderSidebar() {
  const histEl = document.getElementById("sidebar-hist");
  if (!histEl) return;
  if (!state.chats.length) { histEl.innerHTML = '<div style="padding:12px 10px;font-size:12.5px;color:var(--muted)">No chats yet</div>'; return; }
  const tod = new Date().setHours(0,0,0,0);
  const DAY = 86400000;
  const buckets = [[],[],[],[]];
  state.chats.forEach(c => {
    if      (c.createdAt >= tod)           buckets[0].push(c);
    else if (c.createdAt >= tod - DAY)     buckets[1].push(c);
    else if (c.createdAt >= tod - 7*DAY)   buckets[2].push(c);
    else                                    buckets[3].push(c);
  });
  const labels = ["Today","Yesterday","Previous 7 days","Older"];
  histEl.innerHTML = buckets.map((bucket, i) => {
    if (!bucket.length) return "";
    const items = bucket.map(c =>
      '<div class="hist-item' + (c.id === state.activeChatId ? " active" : "") + '" onclick="switchChat(\'' + c.id + '\')">' +
        '<span class="hist-item-title">' + escHtml(c.title) + '</span>' +
        '<button class="hist-delete" onclick="deleteChat(\'' + c.id + '\',event)" title="Delete">' +
          '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>' +
        '</button>' +
      '</div>'
    ).join("");
    return '<div class="hist-group-label">' + labels[i] + '</div>' + items;
  }).join("");
}

/*  Feed DOM  */
function scrollDown() { feedEl.scrollTop = feedEl.scrollHeight; }

function addMsgDom(role, text, animate) {
  const article = document.createElement("article");
  article.className = "msg " + role;
  if (!animate) article.style.animation = "none";
  const row = document.createElement("div");
  row.className = "msg-row";
  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = role === "assistant" ? "B" : sessionEmail.charAt(0).toUpperCase();
  const body = document.createElement("div");
  body.className = "msg-body";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  if (role === "user") {
    bubble.textContent = text;
  } else {
    bubble.innerHTML = renderMd(text);
    bubble.querySelectorAll("pre code").forEach(b => { try { hljs.highlightElement(b); } catch {} });
  }
  body.appendChild(bubble);
  row.appendChild(av); row.appendChild(body);
  article.appendChild(row);
  feedInner.appendChild(article);
  return bubble;
}

function addThinkingDom() {
  const article = document.createElement("article");
  article.className = "msg assistant";
  article.id = "thinkingMsg";
  article.innerHTML = '<div class="msg-row"><div class="avatar">B</div><div class="msg-body"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div></div>';
  feedInner.appendChild(article);
}

function removeThinking() { const el = document.getElementById("thinkingMsg"); if (el) el.remove(); }

function renderAll() {
  feedInner.innerHTML = "";
  welcomeEl.style.display = (state.messages.length || state.thinking) ? "none" : "flex";
  state.messages.forEach(m => addMsgDom(m.role, m.content, false));
  if (state.thinking) addThinkingDom();
  scrollDown();
}

/*  Streaming  */
async function streamReply(fullText) {
  removeThinking();
  const article = document.createElement("article");
  article.className = "msg assistant";
  article.style.animation = "none";
  const row = document.createElement("div");
  row.className = "msg-row";
  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = "B";
  const body = document.createElement("div");
  body.className = "msg-body";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble streaming-cursor";
  body.appendChild(bubble); row.appendChild(av); row.appendChild(body);
  article.appendChild(row); feedInner.appendChild(article);

  const words = fullText.split(/(\s+)/);
  let rendered = "";
  for (let i = 0; i < words.length; i++) {
    rendered += words[i];
    bubble.textContent = rendered;
    scrollDown();
    if (words[i].trim()) await new Promise(r => setTimeout(r, 24 + Math.random() * 28));
  }

  bubble.classList.remove("streaming-cursor");
  bubble.innerHTML = renderMd(fullText);
  bubble.querySelectorAll("pre code").forEach(b => { try { hljs.highlightElement(b); } catch {} });
  scrollDown();
  state.messages.push({ role: "assistant", content: fullText });

  /* Persist to active chat */
  const chat = getActiveChat();
  if (chat) { chat.messages = [...state.messages]; saveChats(); }
}

/*  Submit  */
async function handleSubmit() {
  const text = promptEl.value.trim();
  if (!text || state.thinking) return;

  /* Create chat if none */
  if (!state.activeChatId || !getActiveChat()) {
    const id = genId();
    state.chats.unshift({ id, title: trunc(text, 40), messages: [], createdAt: Date.now() });
    state.activeChatId = id;
  } else {
    const chat = getActiveChat();
    if (chat && chat.messages.length === 0) chat.title = trunc(text, 40);
  }

  state.messages.push({ role: "user", content: text });
  state.thinking = true;
  sendBtn.disabled = true;
  promptEl.value = "";
  autoResize();

  welcomeEl.style.display = "none";
  addMsgDom("user", text, true);
  addThinkingDom();
  scrollDown();

  /* Persist user message */
  const chat = getActiveChat();
  if (chat) { chat.messages = [...state.messages]; saveChats(); }
  renderSidebar();

  await new Promise(r => setTimeout(r, 260 + Math.random() * 220));
  const backendReply = await getBackendReply(text);
  const reply = backendReply || getReply(text);
  state.thinking = false;

  state.context.push({user: text, bot: reply});
  if (state.context.length > 5) state.context.shift();

  await streamReply(reply);

  sendBtn.disabled = false;
  promptEl.focus();
}

/*  Auto-resize textarea  */
function autoResize() {
  promptEl.style.height = "0px";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + "px";
}

/*  Model selector  */
function applyModelMode(mode, persist) {
  modelMode = (mode === "baobab_gpti") ? "baobab_gpti" : "aria";
  if (persist) localStorage.setItem(MODEL_MODE_KEY, modelMode);
  const selIcon = document.getElementById("sel-icon");
  const selName = document.getElementById("sel-name");
  const chkBaobab = document.getElementById("chk-baobab");
  const chkAria   = document.getElementById("chk-aria");
  const optBaobab = document.querySelector('[data-model="baobab_gpti"]');
  const optAria   = document.querySelector('[data-model="aria"]');
  if (modelMode === "aria") {
    chipEl.textContent = "ARIA (live)";
    if (selIcon) selIcon.textContent = "\u2728";
    if (selName) selName.textContent = "ARIA";
    if (chkBaobab) chkBaobab.style.display = "none";
    if (chkAria)   chkAria.style.display   = "inline";
    if (optBaobab) optBaobab.classList.remove("sel");
    if (optAria)   optAria.classList.add("sel");
  } else {
    chipEl.textContent = "baobab gpti (local)";
    if (selIcon) selIcon.textContent = "\u{1F9E0}";
    if (selName) selName.textContent = "baobab gpti";
    if (chkBaobab) chkBaobab.style.display = "inline";
    if (chkAria)   chkAria.style.display   = "none";
    if (optBaobab) optBaobab.classList.add("sel");
    if (optAria)   optAria.classList.remove("sel");
  }
}

/*  Sidebar mobile  */
function openSidebar()  { document.getElementById("sidebar").classList.add("open");    document.getElementById("sidebar-overlay").classList.add("open"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("sidebar-overlay").classList.remove("open"); }

/*  Suggestion helper  */
function useSuggestion(txt) {
  promptEl.value = txt;
  autoResize();
  sendBtn.disabled = false;
  handleSubmit();
}

/*  Events  */
composerEl.addEventListener("submit", e => { e.preventDefault(); handleSubmit(); });

promptEl.addEventListener("input", () => {
  autoResize();
  sendBtn.disabled = !promptEl.value.trim() || state.thinking;
});

promptEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
});

/* Model dropdown */
const modelSelBtn = document.getElementById("model-sel-btn");
const modelDropdown = document.getElementById("model-dropdown");
modelSelBtn.addEventListener("click", e => { e.stopPropagation(); modelDropdown.classList.toggle("open"); });
document.querySelectorAll(".model-opt").forEach(opt => {
  opt.addEventListener("click", () => {
    applyModelMode(opt.dataset.model, true);
    modelDropdown.classList.remove("open");
  });
});
document.addEventListener("click", () => modelDropdown.classList.remove("open"));
modelDropdown.addEventListener("click", e => e.stopPropagation());

/* New chat btn */
document.getElementById("new-chat-btn").addEventListener("click", () => { newChatSession(); closeSidebar(); });

/* Mobile */
const hambBtn = document.getElementById("hamburger");
const overlay = document.getElementById("sidebar-overlay");
if (hambBtn) hambBtn.addEventListener("click", openSidebar);
if (overlay)  overlay.addEventListener("click", closeSidebar);

/*  Init  */
(function init() {
  state.knowledge = loadKnowledge();
  buildIDF();
  loadChats();
  /* Load active chat messages */
  const chat = getActiveChat();
  if (chat) { state.messages = [...chat.messages]; } else { state.messages = []; }
  applyModelMode(localStorage.getItem(MODEL_MODE_KEY) || "aria", false);
  renderSidebar();
  renderAll();
  autoResize();
  sendBtn.disabled = true;
  setTimeout(() => promptEl.focus(), 100);
})();
</script>
